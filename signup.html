<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YardWorkx — Sign Up</title>
  <meta name="description" content="Create your YardWorkx account and start renting equipment today." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
    .text-gradient { background: linear-gradient(135deg, #F97316, #FBBF24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .text-muted { color: #1E293B !important; }
    body.dark-mode .text-muted { color: #CCCCCC !important; }

    .signup-input { transition: all 0.2s ease; }
    .signup-input:focus { border-color: #F97316; box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15); }

    body.dark-mode { background: #000000 !important; color: #FFFFFF !important; }
    body.dark-mode #mainNav { background: rgba(0,0,0,0.85) !important; backdrop-filter: blur(12px) !important; border-color: rgba(255,255,255,0.08) !important; }
    body.dark-mode #themeToggle, body.dark-mode #rtlToggle { background: #F8FAFC !important; border-color: #E2E4E9 !important; }
    body.dark-mode #themeToggle i, body.dark-mode #rtlToggle i { color: #000000 !important; }
    body.dark-mode .text-\[#F97316\] { color: #FFFFFF !important; }
    body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4, body.dark-mode h5, body.dark-mode h6 { color: #FFFFFF !important; }
    body.dark-mode p, body.dark-mode label { color: #FFFFFF !important; }
    body.dark-mode .text-\[#334155\], body.dark-mode .text-\[#475569\] { color: #FFFFFF !important; }
    body.dark-mode .text-white, body.dark-mode .text-white\/60, body.dark-mode .text-white\/70, body.dark-mode .text-white\/90 { color: #FFFFFF !important; }
    body.dark-mode .text-\[#0F172A\], body.dark-mode .text-\[#151515\] { color: #FFFFFF !important; }
    body.dark-mode .text-gradient { background: linear-gradient(135deg, #F97316, #FBBF24) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; background-clip: text !important; }
    body.dark-mode .bg-white { background: #000000 !important; }
    body.dark-mode .bg-white\/95 { background: #000000 !important; }
    body.dark-mode .bg-\[#F8FAFC\] { background: #000000 !important; }
    body.dark-mode .bg-\[#0F172A\] { background: #000000 !important; }
    body.dark-mode .border-\[#E2E4E9\] { border-color: rgba(255,255,255,0.08) !important; }
    body.dark-mode .shadow-sm, body.dark-mode .shadow-md, body.dark-mode .shadow-lg,
    body.dark-mode .shadow-xl, body.dark-mode .shadow-2xl { box-shadow: 0 0 0 1px rgba(255,255,255,0.06) !important; }
    body.dark-mode .hover\:bg-\[#F8FAFC\]:hover { background: #1A1A1A !important; }

    @keyframes nav-line {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    .animate-nav-line { animation: nav-line 2.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-[#F97316] antialiased overflow-x-hidden min-h-screen flex flex-col">
  <div id="navbar"></div>

  <main class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-8 py-24">
    <div class="w-full max-w-4xl animate-fade-in-up">
      <div class="bg-white border border-[#E2E4E9] rounded-2xl shadow-sm overflow-hidden grid lg:grid-cols-2">
        <div class="p-6 sm:p-8 lg:p-10">
          <div class="text-center lg:text-left mb-6">
            <div class="w-12 h-12 rounded-2xl bg-[#F97316] flex items-center justify-center mx-auto lg:mx-0 mb-3 shadow-lg shadow-[#F97316]/25">
              <i class="fa-solid fa-user-plus text-[#151515] text-lg"></i>
            </div>
            <h1 class="text-2xl font-black text-[#F97316] dm-white">Create Account</h1>
            <p class="text-sm text-muted mt-1">Join YardWorkx and start renting</p>
          </div>

          <form class="space-y-4">
            <div class="relative">
              <label class="block text-xs font-semibold text-muted mb-1.5">Full Name</label>
              <span class="absolute left-4 top-[38px] text-[#475569]"><i class="fa-regular fa-user"></i></span>
              <input type="text" placeholder="Full Name" class="signup-input w-full bg-white border border-[#E2E4E9] rounded-xl px-11 py-3 text-sm font-medium text-[#F97316] placeholder:text-[#475569] focus:border-[#F97316] focus:ring-2 focus:ring-[#F97316]/20 transition-all outline-none">
            </div>

            <div class="relative">
              <label class="block text-xs font-semibold text-muted mb-1.5">Email Address</label>
              <span class="absolute left-4 top-[38px] text-[#475569]"><i class="fa-regular fa-envelope"></i></span>
              <input type="email" placeholder="Email Address" class="signup-input w-full bg-white border border-[#E2E4E9] rounded-xl px-11 py-3 text-sm font-medium text-[#F97316] placeholder:text-[#475569] focus:border-[#F97316] focus:ring-2 focus:ring-[#F97316]/20 transition-all outline-none">
            </div>

            <div class="relative">
              <label class="block text-xs font-semibold text-muted mb-1.5">Phone Number</label>
              <span class="absolute left-4 top-[38px] text-[#475569]"><i class="fa-solid fa-phone"></i></span>
              <input type="tel" placeholder="Phone Number" class="signup-input w-full bg-white border border-[#E2E4E9] rounded-xl px-11 py-3 text-sm font-medium text-[#F97316] placeholder:text-[#475569] focus:border-[#F97316] focus:ring-2 focus:ring-[#F97316]/20 transition-all outline-none">
            </div>

            <div class="relative">
              <label class="block text-xs font-semibold text-muted mb-1.5">Password</label>
              <span class="absolute left-4 top-[38px] text-[#475569]"><i class="fa-solid fa-lock"></i></span>
              <input type="password" placeholder="Password" class="signup-input w-full bg-white border border-[#E2E4E9] rounded-xl px-11 py-3 text-sm font-medium text-[#F97316] placeholder:text-[#475569] focus:border-[#F97316] focus:ring-2 focus:ring-[#F97316]/20 transition-all outline-none">
            </div>

            <div class="relative">
              <label class="block text-xs font-semibold text-muted mb-1.5">Confirm Password</label>
              <span class="absolute left-4 top-[38px] text-[#475569]"><i class="fa-solid fa-shield-halved"></i></span>
              <input type="password" placeholder="Confirm Password" class="signup-input w-full bg-white border border-[#E2E4E9] rounded-xl px-11 py-3 text-sm font-medium text-[#F97316] placeholder:text-[#475569] focus:border-[#F97316] focus:ring-2 focus:ring-[#F97316]/20 transition-all outline-none">
            </div>

            <label class="flex items-start gap-2 cursor-pointer pt-1">
              <input type="checkbox" class="w-4 h-4 mt-0.5 rounded border-[#E2E4E9] text-[#F97316] focus:ring-[#F97316]">
              <span class="text-xs text-muted font-medium">I agree to the <a href="#" class="text-[#F97316] font-semibold hover:underline">Terms of Service</a> and <a href="#" class="text-[#F97316] font-semibold hover:underline">Privacy Policy</a></span>
            </label>

            <button type="submit" class="w-full bg-[#F97316] hover:bg-[#EA580C] text-[#151515] font-bold py-3 rounded-xl transition-all duration-200 text-sm shadow-sm hover:shadow-md hover:shadow-[#F97316]/30 active:scale-95 mt-2">
              <i class="fa-solid fa-user-plus mr-2"></i> Create Account
            </button>
          </form>

          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-[#E2E4E9]"></div></div>
            <div class="relative flex justify-center"><span class="bg-white px-3 text-xs font-semibold text-muted">or sign up with</span></div>
          </div>

          <div class="grid grid-cols-3 gap-2">
            <button class="flex items-center justify-center gap-1.5 px-3 py-2.5 border border-[#E2E4E9] rounded-xl text-xs font-semibold text-muted hover:bg-[#F8FAFC] hover:border-[#F97316] hover:text-[#F97316] transition-all">
              <i class="fa-brands fa-google"></i> Google
            </button>
            <button class="flex items-center justify-center gap-1.5 px-3 py-2.5 border border-[#E2E4E9] rounded-xl text-xs font-semibold text-muted hover:bg-[#F8FAFC] hover:border-[#F97316] hover:text-[#F97316] transition-all">
              <i class="fa-brands fa-apple"></i> Apple
            </button>
            <button class="flex items-center justify-center gap-1.5 px-3 py-2.5 border border-[#E2E4E9] rounded-xl text-xs font-semibold text-muted hover:bg-[#F8FAFC] hover:border-[#F97316] hover:text-[#F97316] transition-all">
              <i class="fa-brands fa-facebook-f"></i> Facebook
            </button>
          </div>

          <p class="text-center text-xs text-muted mt-6">
            Already have an account? <a href="login.html" class="text-[#F97316] font-semibold hover:underline">Log in</a>
          </p>
        </div>

        <div class="relative min-h-[280px] lg:min-h-full overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-br from-[#F97316]/20 to-[#EA580C]/20 z-10"></div>
          <img src="assets/images/equipment-yard.jpg" alt="Equipment Yard" class="w-full h-full object-cover absolute inset-0">
          <div class="absolute bottom-0 left-0 right-0 z-20 p-6 sm:p-8 lg:p-10 bg-gradient-to-t from-[#0F172A]/80 via-[#0F172A]/30 to-transparent">
            <div class="flex items-center gap-2 mb-2">
              <div class="w-2 h-2 rounded-full bg-[#F97316]"></div>
              <span class="text-[#F97316] font-semibold text-xs tracking-widest uppercase">YardWorkx</span>
            </div>
            <h2 class="text-xl sm:text-2xl font-black text-white">Join the <br/><span class="text-gradient">YardWorkx</span> Family</h2>
            <p class="text-white/70 text-sm mt-2 leading-relaxed max-w-xs">Create your account and enjoy exclusive discounts, easy rentals, and priority support.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/navbar.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
