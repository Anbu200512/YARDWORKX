  <style>
    * { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-in-left {
      from { opacity: 0; transform: translateX(-60px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes nav-line {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-float-delayed { animation: float 6s ease-in-out 2s infinite; }
    .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
    .animate-slide-in-left { animation: slide-in-left 0.8s ease-out forwards; }
    .animate-slide-in-right { animation: slide-in-right 0.8s ease-out forwards; }
    .animate-scale-in { animation: scale-in 0.6s ease-out forwards; }
    .animate-spin-slow { animation: spin-slow 20s linear infinite; }

    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }
    .stagger-5 { animation-delay: 0.5s; }
    .stagger-6 { animation-delay: 0.6s; }
    .animate-fade-in-up, .animate-slide-in-left, .animate-slide-in-right, .animate-scale-in { animation-fill-mode: both; }

    .lift-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .lift-card:hover { transform: translateY(-8px) scale(1.02); }

    .text-gradient { background: linear-gradient(135deg, #F97316, #FBBF24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .border-glow:hover {
      box-shadow: 0 0 0 2px #F97316, 0 0 25px rgba(249, 115, 22, 0.3);
    }

    .text-muted { color: #1E293B !important; }
    body.dark-mode .text-muted { color: #CCCCCC !important; }

    body.dark-mode { background: #000000 !important; color: #FFFFFF !important; }

    body.dark-mode #mobilePanel { background: #111111 !important; border-color: rgba(255,255,255,0.08) !important; }
    body.dark-mode #footer footer { background: #000000 !important; }

    body.dark-mode .text-\[#F97316\] { color: #FFFFFF !important; }
    body.dark-mode h1, body.dark-mode h2, body.dark-mode h3,
    body.dark-mode h4, body.dark-mode h5, body.dark-mode h6 { color: #FFFFFF !important; }
    body.dark-mode p { color: #FFFFFF !important; }
    body.dark-mode .text-\[#334155\] { color: #FFFFFF !important; }
    body.dark-mode .text-\[#475569\] { color: #FFFFFF !important; }
    body.dark-mode .text-white { color: #FFFFFF !important; }
    body.dark-mode .text-white\/60, body.dark-mode .text-white\/70, body.dark-mode .text-white\/90 { color: #FFFFFF !important; }
    body.dark-mode .text-\[#0F172A\], body.dark-mode .text-\[#151515\] { color: #FFFFFF !important; }
    body.dark-mode .text-gradient { background: linear-gradient(135deg, #F97316, #FBBF24) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; background-clip: text !important; }
    body.dark-mode .bg-\[#F97316\] .text-\[#0F172A\],
    body.dark-mode .bg-\[#F97316\] .text-\[#151515\] { color: #0F172A !important; }

    body.dark-mode .bg-white { background: #000000 !important; }
    body.dark-mode .bg-white\/95 { background: #000000 !important; }
    body.dark-mode .bg-\[#F8FAFC\] { background: #000000 !important; }
    body.dark-mode .bg-\[#0F172A\] { background: #000000 !important; }
    body.dark-mode .border-\[#E2E4E9\] { border-color: rgba(255,255,255,0.08) !important; }
    body.dark-mode .divide-\[#E2E4E9\] > * { border-color: rgba(255,255,255,0.08) !important; }

    body.dark-mode .bg-white\/90 { background: rgba(0,0,0,0.9) !important; }
    body.dark-mode .bg-white\/80 { background: rgba(0,0,0,0.85) !important; }
    body.dark-mode .bg-white\/15 { background: rgba(255,255,255,0.08) !important; }
    body.dark-mode .border-white\/30 { border-color: rgba(255,255,255,0.12) !important; }

    body.dark-mode .hover\:bg-\[#F8FAFC\]:hover { background: #1A1A1A !important; }

    body.dark-mode .shadow-sm, body.dark-mode .shadow-md, body.dark-mode .shadow-lg,
    body.dark-mode .shadow-xl, body.dark-mode .shadow-2xl { box-shadow: 0 0 0 1px rgba(255,255,255,0.06) !important; }

    body.dark-mode .hero-gradient {
      background: linear-gradient(135deg, #000000 0%, #0A0A0A 50%, #000000 100%) !important;
    }
    body.dark-mode .hero-overlay {
      background: radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.08) 0%, transparent 60%),

    }

    body.dark-mode .card-dark-bg { background: #000000 !important; }
    body.dark-mode .card-dark-bg .row-white-bg { background: #000000 !important; border-color: #2a2a2a !important; }
    body.dark-mode .team-card { background: #000000 !important; border-color: rgba(255,255,255,0.08) !important; }
    body.dark-mode .value-card { background: #000000 !important; border-color: rgba(255,255,255,0.08) !important; }
    body.dark-mode .dark-bg-soft { background: #000000 !important; }

    ::-moz-selection { background: rgba(234, 179, 8, 0.35); color: #0F172A; }
    html, body { margin: 0; padding: 0; }

    button, a, input, select { outline-offset: 2px; }
    button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid #F97316; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }

    /* Full Black Background for Dark Mode */
body.dark-mode,
body.dark-mode main,
body.dark-mode section {
    background: #000000 !important;
}

/* All white/light sections become black */
body.dark-mode .bg-white,
body.dark-mode .bg-\[\#F8FAFC\],
body.dark-mode .bg-white\/90,
body.dark-mode .bg-white\/95,
body.dark-mode .bg-white\/80 {

/* Cards */
body.dark-mode .team-card,
body.dark-mode .value-card,
body.dark-mode .card-dark-bg,
body.dark-mode .row-white-bg {

/* Text */
body.dark-mode h1,
body.dark-mode h2,
body.dark-mode h3,
body.dark-mode h4,
body.dark-mode h5,
body.dark-mode h6,
body.dark-mode p,
body.dark-mode span {
    color: #ffffff !important;
}

/* Footer */
body.dark-mode footer {
    background: #000000 !important;
}

<body class="bg-white text-[#F97316] antialiased overflow-x-hidden">

          Looks like this tool is missing from our yard. The page you're looking for doesn't exist or has been moved.

        <div class="flex flex-wrap justify-center gap-4 animate-fade-in-up stagger-3">

          <a href="equipment.html" class="bg-white/5 backdrop-blur-sm border border-white/15 hover:bg-white/10 hover:border-white/30 text-white font-semibold px-7 py-3.5 rounded-xl transition-all flex items-center gap-2 text-sm">

  <script src="js/main.js"></script>
